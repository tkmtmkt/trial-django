ServerName example.com

<VirtualHost *:80>
    ServerName localhost
    ServerAlias *localhost
    ServerAdmin setup@localhost

    Redirect permanent / https://localhost
</VirtualHost>

<VirtualHost *:443>
    ServerAlias https://localhost

    WSGIDaemonProcess code display-name=code user=setup group=setup python-path="/home/setup/code"
    WSGIScriptAlias /code /home/setup/code/config/wsgi.py
    <Directory /home/setup/code>
        WSGIProcessGroup code
        WSGIApplicationGroup %{GLOBAL}
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /code/static /home/setup/code/data/static
    <Directory /home/setup/code/data/static>
        Require all granted
    </Directory>
</VirtualHost>
